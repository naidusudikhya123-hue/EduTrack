spring:
  application:
    name: auth-service
  config:
    import: optional:configserver:http://localhost:8888

app:
  monitoring:
    aop:
      enabled: true
resilience4j:
  circuitbreaker:
    instances:
      userServiceSignup:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: always
